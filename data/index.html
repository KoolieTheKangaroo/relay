<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relay Control</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .relay { margin-bottom: 1rem; }
    button { margin-right: 0.5rem; padding: 0.5rem 1rem; }
    .status { font-weight: bold; }
  </style>
</head>
<body>
  <h1>Relay Control (1-3 active)</h1>

  <div class="relay" data-id="1">
    <span>Relay 1:</span>
    <button onclick="setRelay(1, true)">ON</button>
    <button onclick="setRelay(1, false)">OFF</button>
    <span class="status" id="s1">unknown</span>
  </div>

  <div class="relay" data-id="2">
    <span>Relay 2:</span>
    <button onclick="setRelay(2, true)">ON</button>
    <button onclick="setRelay(2, false)">OFF</button>
    <span class="status" id="s2">unknown</span>
  </div>

  <div class="relay" data-id="3">
    <span>Relay 3:</span>
    <button onclick="setRelay(3, true)">ON</button>
    <button onclick="setRelay(3, false)">OFF</button>
    <span class="status" id="s3">unknown</span>
  </div>

  <script>
    async function setRelay(id, on) {
      const endpoint = on ? '/api/relay/on' : '/api/relay/off';
      await fetch(`${endpoint}?id=${id}`, { method: 'POST' });
      await loadState();
    }

    async function loadState() {
      const response = await fetch('/api/relay/state');
      const data = await response.json();
      for (const relay of data.relays) {
        if (relay.id <= 3) {
          const el = document.getElementById(`s${relay.id}`);
          el.textContent = relay.state ? 'ON' : 'OFF';
        }
      }
    }

    loadState();
  </script>
</body>
</html>
